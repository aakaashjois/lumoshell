name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example: v0.1.1)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Guard formula structure for release automation
        run: |
          set -euo pipefail
          FORMULA="Formula/lumoshell.rb"
          if [[ ! -f "$FORMULA" ]]; then
            echo "Missing formula file: $FORMULA" >&2
            exit 1
          fi
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          formula_path = pathlib.Path("Formula/lumoshell.rb")
          content = formula_path.read_text()

          if not re.search(r'^\s*url\s+"[^"]+"', content, flags=re.M):
            print(f"Expected stable formula url line not found in {formula_path}", file=sys.stderr)
            raise SystemExit(1)

          if not re.search(r'^\s*sha256\s+"[0-9a-f]{64}"', content, flags=re.M):
            print(f"Expected sha256 line not found in {formula_path}", file=sys.stderr)
            raise SystemExit(1)
          PY

      - name: Build universal appearance sync agent
        run: |
          cd src/appearance-sync-agent
          export MACOSX_DEPLOYMENT_TARGET=12.0
          swift build -c release --arch arm64
          swift build -c release --arch x86_64

      - name: Create universal binary
        run: |
          lipo -create \
            src/appearance-sync-agent/.build/arm64-apple-macosx/release/lumoshell-appearance-sync-agent \
            src/appearance-sync-agent/.build/x86_64-apple-macosx/release/lumoshell-appearance-sync-agent \
            -output src/appearance-sync-agent/.build/release/lumoshell-appearance-sync-agent
          lipo -info src/appearance-sync-agent/.build/release/lumoshell-appearance-sync-agent

      - name: Package universal macOS artifact
        run: |
          mkdir -p dist/universal
          cp src/appearance-sync-agent/.build/release/lumoshell-appearance-sync-agent dist/universal/
          cp bin/lumoshell dist/universal/
          cp bin/lumoshell-apply dist/universal/
          cp bin/lumoshell-install dist/universal/
          cp bin/lumoshell-uninstall dist/universal/
          chmod +x dist/universal/lumoshell* dist/universal/lumoshell-appearance-sync-agent
          tar -czf dist/lumoshell-darwin-universal.tar.gz -C dist/universal .

      - name: Generate checksums
        run: |
          shasum -a 256 dist/lumoshell-darwin-universal.tar.gz > dist/SHA256SUMS.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/lumoshell-darwin-universal.tar.gz
            dist/SHA256SUMS.txt

      - name: Prepare Homebrew formula update
        id: formula_update
        env:
          VERSION: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail

          export SHA256
          SHA256="$(awk '{print $1}' dist/SHA256SUMS.txt)"
          git fetch origin main
          git checkout -B main origin/main

          python3 - <<'PY'
          import re
          from pathlib import Path
          import os

          version = os.environ["VERSION"]
          sha256 = os.environ["SHA256"]
          url = f"https://github.com/aakaashjois/lumoshell/releases/download/{version}/lumoshell-darwin-universal.tar.gz"
          formula_path = Path("Formula/lumoshell.rb")
          content = formula_path.read_text()

          content = re.sub(r'^\s*url\s+"[^"]+"$', f'  url "{url}"', content, flags=re.M)
          content = re.sub(r'^\s*sha256\s+"[^"]+"$', f'  sha256 "{sha256}"', content, flags=re.M)

          formula_path.write_text(content)
          PY

          if git diff --quiet -- Formula/lumoshell.rb; then
            echo "Formula already up to date for ${VERSION}; no commit needed."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open PR for formula update
        if: steps.formula_update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          base: main
          branch: automation/formula-${{ env.RELEASE_TAG }}
          title: Update Homebrew formula for ${{ env.RELEASE_TAG }}
          commit-message: Update Homebrew formula for ${{ env.RELEASE_TAG }}
          body: |
            Automated formula update after release `${{ env.RELEASE_TAG }}`.

            - Updates `Formula/lumoshell.rb` `url` to this release asset
            - Updates `sha256` from generated `SHA256SUMS.txt`
